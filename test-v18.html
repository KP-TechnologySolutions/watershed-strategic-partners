<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Watershed Strategic Partners | Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; background: #f5f5f5; }
        .hero { max-width: 800px; margin: 0 auto; }

        .subhead { font-size: 1.25rem; color: #64748b; margin-bottom: 30px; }
        .stats { display: flex; gap: 40px; margin-top: 30px; }
        .stat { text-align: center; }
        .stat-number { font-size: 2rem; font-weight: bold; color: #1a365d; }
        .stat-label { font-size: 0.875rem; color: #94a3b8; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="hero">
        <h1 class="headline">
            Senior leadership when you need it — without the full-time overhead.
        </h1>
        <p class="subhead">
            Strategic executive partnership for companies at inflection points. Proudly Charleston-based. Wherever you need us.
        </p>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-number">18+</div>
                <div class="stat-label">Years</div>
            </div>
            <div class="stat">
                <div class="stat-number">200+</div>
                <div class="stat-label">Projects</div>
            </div>
            <div class="stat">
                <div class="stat-number">95%</div>
                <div class="stat-label">Retention</div>
            </div>
        </div>
    </div>
